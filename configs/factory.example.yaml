project_name: tictoc-factory
mode: hybrid
default_subreddits:
  - nosleep
  - confessions
  - TIFU
  - AmItheAsshole
  - shortscarystories
  - LetsNotMeet
providers:
  discovery_provider: reddit
  llm_provider: openai
  transcription_provider: sidecar
  openai_api_key_env: OPENAI_API_KEY
  openai_model: gpt-5-mini
  openai_timeout_seconds: 45
tts:
  provider: auto
  openai_model: gpt-4o-mini-tts
  # OpenAI built-in voices include: alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
  openai_voice: alloy
  system_voice: Samantha
  sample_rate_hz: 44100
  speech_speed: 1.10
  sentence_pause_ms: 140
  word_timing_mode: auto
  # openai_instructions: "Custom TTS prompt for voice style"
subtitles:
  font_name: DejaVu Sans
  font_file: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
  font_size: 46
  max_words_per_line: 4
  max_lines_per_caption: 2
  margin_horizontal: 120
  position_y: 0.56
  outline: 5
  shadow: 3
  stroke_color: "#000000"
  shadow_color: "#000000CC"
  highlight_color: "#00e5ff"
  active_word_scale: 1.18
  pop_animation_strength: 0.08
  pop_animation_ms: 80
story_pacing:
  hook_max_words: 8
  max_segment_words: 12
  suspense_segments: 9
  minimum_total_words: 60
  target_duration_seconds_min: 30
  target_duration_seconds_max: 60
  intro_pause_ms: 180
  mid_pause_ms: 140
  final_pause_ms: 90
reddit_card:
  enabled: true
  duration_seconds: 2.5
  card_width: 930
  position_y: 0.5
  corner_radius: 30
  title_font_size: 38
  body_font_size: 28
  meta_font_size: 22
  max_body_lines: 7
  background_color: "#171b22"
  border_color: "#2d333b"
  meta_color: "#c9d1d9"
  secondary_color: "#8b949e"
  accent_color: "#ff4500"
scheduler:
  scan_interval_minutes: 15
  default_clip_lengths_seconds: [25, 35, 45, 60]
content_policy:
  max_posts_per_day: 3
  min_source_score: 100
  preferred_modes:
    - hybrid
    - reddit_story_gameplay
    - longform_clip
composition:
  layout: split
  subtitles_style: bold_box
  width: 1080
  height: 1920
  font_file: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
