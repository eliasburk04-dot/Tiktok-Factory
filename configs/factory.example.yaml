project_name: tictoc-factory
mode: hybrid
default_subreddits:
  - nosleep
  - confessions
  - TIFU
  - AmItheAsshole
  - shortscarystories
  - LetsNotMeet
providers:
  discovery_provider: reddit
  llm_provider: openai
  transcription_provider: sidecar
  openai_api_key_env: OPENAI_API_KEY
  openai_model: gpt-5-mini
  openai_timeout_seconds: 45
tts:
  provider: auto
  openai_model: gpt-4o-mini-tts
  # OpenAI built-in voices include: alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
  openai_voice: alloy
  system_voice: Samantha
  sample_rate_hz: 44100
  speech_speed: 1.10
  sentence_pause_ms: 140
  word_timing_mode: auto
  # openai_instructions: "Custom TTS prompt for voice style"
subtitles:
  font_name: Montserrat Black
  font_file: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
  font_size: 62
  max_words_per_line: 3
  max_lines_per_caption: 2
  max_chars_per_line: 18
  min_words_per_caption: 2
  target_words_per_caption: 4
  max_words_per_caption: 5
  margin_horizontal: 120
  position_y: 0.52
  outline: 9
  shadow: 4
  stroke_color: "#000000"
  shadow_color: "#000000CC"
  inactive_text_color: "#F8F6F2"
  active_text_color: "#111111"
  highlight_color: "#FFD54A"
  caption_background_color: "#101418CC"
  caption_background_padding_x: 36
  caption_background_padding_y: 24
  caption_background_radius: 32
  active_word_padding_x: 18
  active_word_padding_y: 12
  word_spacing: 20
  line_spacing: 20
  active_word_scale: 1.18
  pop_animation_strength: 0.12
  pop_animation_ms: 80
  caption_lead_in_ms: 40
  caption_linger_ms: 110
  pause_threshold_ms: 180
  max_caption_duration_seconds: 1.80
story_pacing:
  hook_max_words: 8
  max_segment_words: 12
  suspense_segments: 9
  minimum_total_words: 60
  target_duration_seconds_min: 30
  target_duration_seconds_max: 60
  intro_pause_ms: 180
  mid_pause_ms: 140
  final_pause_ms: 90
reddit_card:
  enabled: true
  duration_seconds: 2.5
  intro_animation_seconds: 0.18
  outro_animation_seconds: 0.40
  # transition_sfx_path: /opt/tictoc-factory/assets/audio/universfield-swoosh-06-351021.mp3
  transition_sfx_volume: 0.75
  card_width: 930
  position_y: 0.5
  corner_radius: 30
  title_font_size: 38
  body_font_size: 28
  meta_font_size: 22
  max_body_lines: 7
  background_color: "#171b22"
  border_color: "#2d333b"
  meta_color: "#c9d1d9"
  secondary_color: "#8b949e"
  accent_color: "#ff4500"
scheduler:
  scan_interval_minutes: 15
  default_clip_lengths_seconds: [25, 35, 45, 60]
content_policy:
  max_posts_per_day: 3
  min_source_score: 100
  min_video_duration_seconds: 70
  max_video_duration_seconds: 120
  preferred_modes:
    - hybrid
    - reddit_story_gameplay
    - longform_clip
nextcloud:
  enabled: false
  base_url: "https://cloud.example.com"
  username: "your-username"
  password_env: "NEXTCLOUD_PASSWORD"
  remote_folder: "TikTok-Factory/ready"
  timeout_seconds: 300
composition:
  layout: split
  subtitles_style: bold_box
  width: 1080
  height: 1920
  font_file: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
  target_fps: 30
  gameplay_target_fps: 30
